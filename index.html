<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AC Sales AI OS · 销售冠军 AI 训练台</title>
  <meta name="description" content="暖通空调销售冠军 AI 训练操作系统 — AI 陪练 · 数字客户孪生 · 16 维能力评估 · 经验蒸馏" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 氛围背景：冰川青 / 余烬橙 双辉光 + 点阵 + 颗粒 -->
  <div class="bg-atmos" aria-hidden="true"></div>

  <div id="app">
    <!-- 左侧 10 菜单导航（IA §3 锁定） -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">AC</div>
        <div class="brand-text"><b>AC Sales AI OS</b><span>销售冠军训练台</span></div>
      </div>
      <nav class="nav" id="nav"><!-- JS 渲染 --></nav>
      <div class="sidebar-foot">
        <button class="btn-ghost" id="theme-toggle" title="切换深色 / 浅色"><span class="tt-ic">◐</span><span>主题</span></button>
      </div>
    </aside>

    <!-- 移动端顶部栏 + 抽屉触发 -->
    <div class="mobile-topbar">
      <button class="icon-btn" id="drawer-btn">☰</button>
      <span class="mobile-title">AC Sales AI OS</span>
    </div>

    <div class="main">
      <header class="topbar">
        <div class="crumb-wrap"><span class="crumb-mark">▸</span><div class="crumb" id="crumb">首页</div></div>
        <div class="top-actions">
          <span class="world-chip" id="world-chip"><span class="wc-dot"></span>夏季 · 38℃ · 以旧换新</span>
          <span class="role-pill" id="role-pill">销售顾问</span>
          <div class="avatar" id="avatar">销</div>
        </div>
      </header>

      <!-- Pattern-A：AI 教练横幅（首页/成长中心顶部） -->
      <div id="coach-banner"></div>

      <main id="view" class="view"><!-- 页面渲染 --></main>
    </div>
  </div>

  <!-- 抽屉（移动端导航） -->
  <div class="drawer-mask" id="drawer-mask"></div>

  <!-- 全局浮层 -->
  <div id="toast" class="toast-wrap"></div>
  <div id="modal" class="modal-root"></div>

  <script src="mock.js"></script>
  <script src="app.js"></script>
</body>
</html>
